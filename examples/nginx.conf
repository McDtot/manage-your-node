# Example Nginx reverse proxy for Manage Your Node.
# Obtain certificates first, e.g. with certbot:
#   certbot certonly --nginx -d panel.example.com
#
# The app should be bound to 127.0.0.1:8787 (default HOST/PORT).
# Export TRUST_X_FORWARDED_FOR=1 so login lockout uses the real client IP.

server {
    listen 80;
    server_name panel.example.com;
    # Redirect all plain HTTP to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name panel.example.com;

    ssl_certificate     /etc/letsencrypt/live/panel.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panel.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    # Match the app's request body cap (MAX_BODY_BYTES, default 1 MiB).
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
