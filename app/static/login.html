<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 · Manage Your Node</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <form class="login-panel form" id="loginForm">
        <div class="brand login-brand">
          <span class="brand-mark">MYN</span>
          <div>
            <strong>Manage Your Node</strong>
            <small>管理面板登录</small>
          </div>
        </div>
        <label>
          用户名
          <input name="username" autocomplete="username" value="admin" required />
        </label>
        <label>
          密码
          <input name="password" type="password" autocomplete="current-password" required autofocus />
        </label>
        <p class="form-error" id="loginError" hidden></p>
        <button class="primary" type="submit">登录</button>
      </form>
    </main>
    <script>
      const form = document.querySelector("#loginForm");
      const error = document.querySelector("#loginError");
      const params = new URLSearchParams(window.location.search);
      const next = params.get("next") || "/";

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        error.hidden = true;
        const payload = Object.fromEntries(new FormData(form).entries());
        const response = await fetch("/api/auth/login", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          error.textContent = data.error || "登录失败";
          error.hidden = false;
          return;
        }
        window.location.href = next.startsWith("/") && !next.startsWith("//") ? next : "/";
      });
    </script>
  </body>
</html>
