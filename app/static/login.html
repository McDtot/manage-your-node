<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 · Manage Your Node</title>
    <link rel="stylesheet" href="/static/styles.css?v=ios-20260713" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <div class="login-orb login-orb-one" aria-hidden="true"></div>
      <div class="login-orb login-orb-two" aria-hidden="true"></div>
      <form class="login-panel form" id="loginForm">
        <div class="brand login-brand">
          <span class="brand-mark" aria-hidden="true"><span></span><span></span><span></span></span>
          <div class="brand-copy">
            <strong>Manage Your Node</strong>
            <small>Control Center</small>
          </div>
        </div>
        <div class="login-heading">
          <h1>欢迎回来</h1>
          <p>登录以管理你的服务器、节点与订阅。</p>
        </div>
        <label>
          用户名
          <input name="username" autocomplete="username" value="admin" required />
        </label>
        <label>
          密码
          <input name="password" type="password" autocomplete="current-password" required autofocus />
        </label>
        <p class="form-error" id="loginError" hidden></p>
        <button class="primary login-button" type="submit">登录</button>
        <p class="login-footnote">受 Session、CSRF 与登录限流保护</p>
      </form>
    </main>
    <script src="/static/login.js?v=ios-20260713"></script>
  </body>
</html>
